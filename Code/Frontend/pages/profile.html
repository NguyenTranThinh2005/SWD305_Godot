<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNEG – Hồ Sơ & Tiến Trình</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body {
            background: var(--c-bg);
        }

        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        @media(max-width:900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }

        .sidebar {
            background: var(--c-bg-2);
            border-right: 1px solid var(--c-border);
            padding: var(--sp-lg);
            display: flex;
            flex-direction: column;
            gap: var(--sp-sm);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--sp-sm);
            padding: var(--sp-md) 0;
            margin-bottom: var(--sp-md);
            border-bottom: 1px solid var(--c-border);
            text-decoration: none;
            color: var(--c-text);
        }

        .sidebar-logo-icon {
            width: 36px;
            height: 36px;
            background: var(--g-primary);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: var(--glow-primary);
        }

        .sidebar-logo-text {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: var(--sp-md);
            padding: 10px var(--sp-md);
            border-radius: var(--r-md);
            color: var(--c-text-2);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--t-fast);
        }

        .sidebar-link:hover {
            background: var(--c-surface-2);
            color: var(--c-text);
        }

        .sidebar-link.active {
            background: rgba(108, 99, 255, 0.15);
            color: var(--c-primary-2);
            border-right: 2px solid var(--c-primary);
        }

        .sidebar-link .icon {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-section-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--c-text-3);
            padding: var(--sp-sm) var(--sp-md);
            margin-top: var(--sp-sm);
        }

        .sidebar-user {
            margin-top: auto;
            padding-top: var(--sp-md);
            border-top: 1px solid var(--c-border);
        }

        .sidebar-user-card {
            display: flex;
            align-items: center;
            gap: var(--sp-md);
            padding: var(--sp-md);
            border-radius: var(--r-md);
            background: var(--c-surface);
            cursor: pointer;
            transition: background var(--t-fast);
        }

        .sidebar-user-card:hover {
            background: var(--c-surface-2);
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--g-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .main-content {
            overflow-y: auto;
            padding: var(--sp-xl);
        }

        /* Profile header */
        .profile-header {
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.2), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: var(--r-xl);
            padding: var(--sp-xl);
            display: flex;
            align-items: center;
            gap: var(--sp-xl);
            margin-bottom: var(--sp-xl);
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--g-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: var(--glow-primary);
        }

        .profile-info h2 {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .profile-info p {
            color: var(--c-text-2);
            margin-top: 4px;
        }

        .profile-badges {
            display: flex;
            gap: var(--sp-sm);
            flex-wrap: wrap;
            margin-top: var(--sp-md);
        }

        /* Grammar Tree */
        .tree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--sp-md);
        }

        .tree-topic {
            padding: var(--sp-md);
            border-radius: var(--r-lg);
            border: 1px solid var(--c-border);
            background: var(--c-surface);
            cursor: pointer;
            transition: all var(--t-fast);
            position: relative;
            overflow: hidden;
        }

        .tree-topic:hover {
            border-color: rgba(108, 99, 255, 0.4);
            transform: translateY(-2px);
        }

        .tree-topic-name {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: var(--sp-sm);
        }

        .tree-topic-code {
            font-size: 0.72rem;
            color: var(--c-text-3);
            margin-bottom: var(--sp-sm);
        }

        .tree-topic-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--r-full);
            overflow: hidden;
            margin-bottom: 4px;
        }

        .tree-topic-fill {
            height: 100%;
            border-radius: var(--r-full);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tree-topic-pct {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tree-topic-counts {
            font-size: 0.7rem;
            color: var(--c-text-3);
            margin-top: 2px;
        }

        .mastery-glow {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            pointer-events: none;
        }

        /* History */
        .history-item {
            display: flex;
            align-items: center;
            gap: var(--sp-md);
            padding: var(--sp-md);
            border-radius: var(--r-md);
            border: 1px solid var(--c-border);
            background: var(--c-surface);
            margin-bottom: var(--sp-sm);
        }

        .history-stars {
            font-size: 1.1rem;
            min-width: 60px;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .history-meta {
            font-size: 0.75rem;
            color: var(--c-text-2);
        }

        .history-score {
            font-weight: 700;
            color: var(--c-primary-2);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: var(--sp-xl);
        }

        @media(max-width:1200px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="starfield"></div>
    <div class="layout page-content">
        <aside class="sidebar">
            <a class="sidebar-logo" href="dashboard.html">
                <div class="sidebar-logo-icon">🌀</div>
                <span class="sidebar-logo-text">VNEG</span>
            </a>
            <nav class="sidebar-nav">
                <p class="sidebar-section-title">Học tập</p>
                <a class="sidebar-link" href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
                <a class="sidebar-link" href="world-map.html"><span class="icon">🗺️</span> Thế giới</a>
                <a class="sidebar-link active" href="profile.html"><span class="icon">📊</span> Hồ sơ & Tiến trình</a>
                <p class="sidebar-section-title">Cộng đồng</p>
                <a class="sidebar-link" href="teams.html"><span class="icon">👥</span> Nhóm học tập</a>
            </nav>
            <div class="sidebar-user">
                <div class="sidebar-user-card">
                    <div class="sidebar-avatar" id="sidebarAvatar">😊</div>
                    <div>
                        <div style="font-size:0.9rem;font-weight:600" id="sidebarName">…</div>
                        <div style="font-size:0.75rem;color:var(--c-text-2)">🎓 Học sinh</div>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm btn-full mt-sm" onclick="handleLogout()">🚪 Đăng xuất</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- Profile header -->
            <div class="profile-header">
                <div class="profile-avatar" id="profAvatar">🐉</div>
                <div class="profile-info">
                    <h2 id="profName">…</h2>
                    <p id="profMeta"></p>
                    <div class="profile-badges" id="profBadges"></div>
                </div>
                <div style="margin-left:auto;text-align:right">
                    <a class="btn btn-secondary" href="dashboard.html" style="margin-bottom:var(--sp-sm)">←
                        Dashboard</a>
                </div>
            </div>

            <div class="profile-grid">
                <!-- Grammar Tree -->
                <div>
                    <div class="card-glass">
                        <div class="card-header">
                            <div>
                                <div class="card-title">🌳 Cây Ngữ Pháp</div>
                                <div class="card-subtitle">Mức độ thành thạo từng chủ đề ngữ pháp</div>
                            </div>
                            <select class="form-control" style="width:auto" id="filterGrade" onchange="loadGrammar()">
                                <option value="">Tất cả lớp</option>
                                <option value="1">Lớp 1</option>
                                <option value="2">Lớp 2</option>
                                <option value="3">Lớp 3</option>
                                <option value="4">Lớp 4</option>
                                <option value="5">Lớp 5</option>
                                <option value="6">Lớp 6</option>
                                <option value="7">Lớp 7</option>
                                <option value="8">Lớp 8</option>
                                <option value="9">Lớp 9</option>
                                <option value="10">Lớp 10</option>
                                <option value="11">Lớp 11</option>
                                <option value="12">Lớp 12</option>
                            </select>
                        </div>
                        <div class="tree-grid" id="treeGrid">
                            <div class="loading-screen" style="grid-column:1/-1;min-height:150px">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: stats + history -->
                <div>
                    <!-- Lifetime stats -->
                    <div class="card-glass mb-lg">
                        <div class="card-title mb-md">📈 Thống kê tổng</div>
                        <div class="stat-grid" id="ltStats" style="grid-template-columns:1fr 1fr">
                            <div class="stat-card">
                                <div class="stat-icon">🎮</div>
                                <div class="stat-value" id="stGames">–</div>
                                <div class="stat-label">Lượt chơi</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">⭐</div>
                                <div class="stat-value" id="stStars">–</div>
                                <div class="stat-label">Tổng sao</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">🪙</div>
                                <div class="stat-value" id="stCoins">–</div>
                                <div class="stat-label">Tổng coin</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">🎯</div>
                                <div class="stat-value" id="stAcc">–</div>
                                <div class="stat-label">Avg. Chính xác</div>
                            </div>
                        </div>
                    </div>

                    <!-- Session history -->
                    <div class="card-glass">
                        <div class="card-title mb-md">🕹️ Lịch sử chơi gần đây</div>
                        <div id="historyList">
                            <div class="loading-screen" style="min-height:100px">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container"></div>

    <script type="module">
        import { Auth, Grammar } from '../api.js';
        import { requireAuth, logout } from '../js/auth.js';

        const user = requireAuth(); if (!user) throw new Error('auth');

        window.handleLogout = async function () { await Auth.logout(); logout(); };
        document.getElementById('sidebarAvatar').textContent = user.avatarUrl || '😊';
        document.getElementById('sidebarName').textContent = user.email.split('@')[0];
        document.getElementById('profAvatar').textContent = user.avatarUrl || '🐉';
        document.getElementById('profName').textContent = user.email.split('@')[0];
        document.getElementById('profMeta').textContent = `Lớp ${user.grade || '?'} · ${user.region || '–'} · ${user.email}`;
        if (user.grade) document.getElementById('filterGrade').value = String(user.grade);

        // Badges
        const sessions = JSON.parse(localStorage.getItem('vneg_sessions') || '[]');
        const badges = [];
        if (sessions.length >= 1) badges.push({ icon: '🎮', label: 'Người mới' });
        if (sessions.length >= 5) badges.push({ icon: '🔥', label: 'Nghiện game' });
        if (sessions.some(s => s.stars >= 3)) badges.push({ icon: '⭐', label: 'Hoàn hảo' });
        document.getElementById('profBadges').innerHTML = badges.map(b => `<span class="badge badge-primary">${b.icon} ${b.label}</span>`).join('');

        // Lifetime stats
        const totalStars = sessions.reduce((a, b) => a + (b.stars || 0), 0);
        const totalCoins = sessions.reduce((a, b) => a + (b.coins || 0), 0);
        const avgAcc = sessions.length ? Math.round(sessions.reduce((a, b) => a + (b.accuracy || 0), 0) / sessions.length) : 0;
        document.getElementById('stGames').textContent = sessions.length;
        document.getElementById('stStars').textContent = totalStars;
        document.getElementById('stCoins').textContent = totalCoins;
        document.getElementById('stAcc').textContent = sessions.length ? avgAcc + '%' : '–';

        // History
        const recent = [...sessions].reverse().slice(0, 8);
        document.getElementById('historyList').innerHTML = recent.length ? recent.map(s => `
    <div class="history-item">
      <div class="history-stars">${'⭐'.repeat(s.stars || 0) + '☆'.repeat(3 - (s.stars || 0))}</div>
      <div class="history-info">
        <div class="history-name">Game #${s.gameId || '?'}</div>
        <div class="history-meta">${new Date(s.completedAt).toLocaleDateString('vi-VN')} · ${Math.round(s.accuracy || 0)}% chính xác</div>
      </div>
      <div class="history-score">${s.score || 0}đ</div>
    </div>`).join('') :
            '<div class="empty-state"><div class="empty-icon">🎮</div><p>Chưa có lịch sử. Hãy chơi game!</p><a class="btn btn-primary mt-md" href="world-map.html">Chơi ngay</a></div>';

        // Grammar tree
        window.loadGrammar = async function () {
            const grade = document.getElementById('filterGrade').value || null;
            document.getElementById('treeGrid').innerHTML = '<div class="loading-screen" style="grid-column:1/-1;min-height:150px"><div class="spinner"></div></div>';
            const [topicsRes, progRes] = await Promise.all([
                Grammar.getTopics(grade ? parseInt(grade) : null),
                Grammar.getMyProgress()
            ]);
            const topics = topicsRes.data || [];
            const progMap = {};
            (progRes.data?.progress || []).forEach(p => { progMap[p.grammarTopicId] = p; });

            if (!topics.length) {
                document.getElementById('treeGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📚</div><p>Không có chủ đề ngữ pháp nào</p></div>';
                return;
            }
            document.getElementById('treeGrid').innerHTML = topics.map(t => {
                const p = progMap[t.id];
                const m = p ? Math.round(p.masteryLevel || 0) : 0;
                const correct = p?.correct || 0, wrong = p?.wrong || 0;
                const color = m >= 80 ? '#00e5a0' : m >= 50 ? '#6c63ff' : m >= 20 ? '#ffb74d' : 'rgba(255,255,255,0.2)';
                const label = m >= 80 ? 'Thành thạo' : m >= 50 ? 'Ổn' : m >= 20 ? 'Mới học' : 'Chưa học';
                const labelColor = m >= 80 ? 'var(--c-success)' : m >= 50 ? 'var(--c-primary-2)' : m >= 20 ? 'var(--c-warning)' : 'var(--c-text-3)';
                return `
      <div class="tree-topic">
        <div class="mastery-glow" style="background:${color}"></div>
        <div class="tree-topic-name">${t.name}</div>
        ${t.code ? `<div class="tree-topic-code">${t.code}</div>` : ''}
        <div class="tree-topic-bar"><div class="tree-topic-fill" style="width:${m}%;background:${color}"></div></div>
        <div class="tree-topic-pct" style="color:${labelColor}">${label} · ${m}%</div>
        ${p ? `<div class="tree-topic-counts">✅ ${correct} đúng · ❌ ${wrong} sai</div>` : ''}
      </div>`;
            }).join('');
        };
        loadGrammar();
    </script>
</body>

</html>

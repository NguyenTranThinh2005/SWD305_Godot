<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(~{::title}, ~{::content}, ~{::extraStyle}, ~{::extraScript})}">

<head>
    <title th:fragment="title">User Detail</title>
    <th:block th:fragment="extraStyle"></th:block>
</head>

<body>
    <th:block th:fragment="content">

        <div style="margin-bottom:20px;">
            <a href="/users" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back to Users</a>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-user" style="color:var(--accent); margin-right:8px;"></i>User Details</h3>
                    <span class="badge" th:classappend="'badge-' + ${user.isActive == true ? 'active' : 'inactive'}"
                        th:text="${user.isActive == true ? 'Active' : 'Suspended'}"></span>
                </div>
                <div class="card-body">
                    <table>
                        <tr>
                            <td style="color:var(--text-muted); width:40%;">ID</td>
                            <td th:text="${user.id}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Email</td>
                            <td th:text="${user.email}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Phone</td>
                            <td th:text="${user.phone ?: '—'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Grade</td>
                            <td th:text="${user.grade ?: '—'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Region</td>
                            <td th:text="${user.region ?: '—'}"></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Role</td>
                            <td><span class="badge" th:classappend="'badge-' + ${user.role}"
                                    th:text="${user.role}"></span></td>
                        </tr>
                        <tr>
                            <td style="color:var(--text-muted);">Created At</td>
                            <td
                                th:text="${user.createdAt != null ? #temporals.format(user.createdAt,'dd/MM/yyyy HH:mm') : '—'}">
                            </td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-cog" style="color:var(--warning); margin-right:8px;"></i>Actions</h3>
                </div>
                <div class="card-body" style="padding: 20px;">
                    <form th:if="${user.isActive == true}" th:action="@{/users/{id}/suspend(id=${user.id})}"
                        method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-danger" style="width:100%; margin-bottom:12px;"
                            onclick="return confirm('Suspend this user?')">
                            <i class="fas fa-ban"></i> Suspend User
                        </button>
                    </form>
                    <form th:unless="${user.isActive == true}" th:action="@{/users/{id}/activate(id=${user.id})}"
                        method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-success" style="width:100%; margin-bottom:12px;">
                            <i class="fas fa-check-circle"></i> Reactivate User
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </th:block>
    <th:block th:fragment="extraScript"></th:block>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:fragment="layout(title, content, extraStyle, extraScript)">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VietGram Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --accent2: #22d3ee;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --sidebar-w: 260px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 60%);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(15, 20, 40, 0.85);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand h2 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }

    .sidebar-brand span {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      margin: 12px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .user-info small {
      color: var(--text-muted);
      font-size: 11px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 8px 12px;
    }

    .nav-section {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 12px 8px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.2s;
      margin-bottom: 2px;
    }

    .nav-item:hover,
    .nav-item.active {
      background: var(--surface-hover);
      color: var(--text);
    }

    .nav-item.active {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }

    .nav-item i {
      width: 18px;
      text-align: center;
    }

    .nav-badge {
      margin-left: auto;
      background: var(--danger);
      color: white;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
    }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--danger);
      text-decoration: none;
      font-size: 13.5px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    /* ===== MAIN ===== */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(10, 14, 26, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-time {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .content {
      padding: 32px;
      flex: 1;
    }

    /* ===== CARDS ===== */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .stat-icon.purple {
      background: rgba(99, 102, 241, 0.2);
      color: var(--accent);
    }

    .stat-icon.cyan {
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent2);
    }

    .stat-icon.green {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .stat-icon.yellow {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .stat-icon.red {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .stat-info {
      flex: 1;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .card-body {
      padding: 0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ===== TABLE ===== */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 20px;
      font-size: 13.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    /* ===== BADGES ===== */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .badge-admin {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
    }

    .badge-staff {
      background: rgba(34, 211, 238, 0.15);
      color: #67e8f9;
    }

    .badge-user {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
    }

    .badge-team_owner {
      background: rgba(245, 158, 11, 0.15);
      color: #fcd34d;
    }

    .badge-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
    }

    .badge-resolved {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .badge-investigated {
      background: rgba(34, 211, 238, 0.15);
      color: #67e8f9;
    }

    .badge-active {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .badge-inactive {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    .badge-bug {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    .badge-abuse {
      background: rgba(245, 158, 11, 0.2);
      color: #fcd34d;
    }

    .badge-content {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    /* ===== FORM ===== */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: var(--accent);
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-check input[type=checkbox] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    /* ===== ALERT ===== */
    .alert {
      padding: 12px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 13.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #6ee7b7;
    }

    .alert-danger {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    /* ===== FILTERS ===== */
    .filter-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-row .form-control {
      width: auto;
    }

    /* ===== EMPTY ===== */
    .empty-state {
      padding: 48px;
      text-align: center;
    }

    .empty-state i {
      font-size: 40px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .empty-state p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
  <th:block th:replace="${extraStyle}"></th:block>
</head>

<body>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h2>⚡ VietGram</h2>
      <span>Admin Portal</span>
    </div>

    <div class="sidebar-user" sec:authorize="isAuthenticated()">
      <div class="user-avatar" sec:authentication="principal.username">
        <span th:text="${#strings.substring(#authentication.principal.username, 0, 1).toUpperCase()}">A</span>
      </div>
      <div class="user-info">
        <div th:text="${#authentication.principal.username}" style="font-size:13px; font-weight:500;"></div>
        <small th:text="${#authentication.authorities[0].authority.replace('ROLE_','')}">ADMIN</small>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <a href="/dashboard" class="nav-item" th:classappend="${requestURI == '/dashboard' ? 'active' : ''}">
        <i class="fas fa-chart-pie"></i> Dashboard
      </a>

      <div class="nav-section">Management</div>
      <a href="/users" class="nav-item"
        th:classappend="${requestURI != null and requestURI.contains('/users') ? 'active' : ''}">
        <i class="fas fa-users"></i> Users
      </a>
      <a href="/reports" class="nav-item"
        th:classappend="${requestURI != null and requestURI.contains('/reports') ? 'active' : ''}">
        <i class="fas fa-flag"></i> Reports
      </a>
      <a href="/logs" class="nav-item"
        th:classappend="${requestURI != null and requestURI.contains('/logs') ? 'active' : ''}">
        <i class="fas fa-terminal"></i> System Logs
      </a>

      <div class="nav-section" sec:authorize="hasRole('ADMIN')">Admin Only</div>
      <a href="/admin/games" class="nav-item" sec:authorize="hasRole('ADMIN')"
        th:classappend="${requestURI != null and requestURI.contains('/games') ? 'active' : ''}">
        <i class="fas fa-gamepad"></i> Content / Games
      </a>
    </div>

    <div class="sidebar-footer">
      <form th:action="@{/logout}" method="post" style="width: 100%;">
        <button type="submit" class="logout-btn"
          style="width: 100%; background: transparent; border: none; cursor: pointer; text-align: left; font-family: inherit;">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </form>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h1>
        <th:block th:text="${pageTitle ?: 'Dashboard'}"></th:block>
      </h1>
      <div class="topbar-right">
        <div class="topbar-time">
          <i class="fas fa-clock" style="color: var(--accent2);"></i>
          <span id="clock"></span>
        </div>
      </div>
    </div>

    <div class="content">
      <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <span th:text="${success}"></span>
      </div>
      <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
      </div>

      <th:block th:replace="${content}"></th:block>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleString('vi-VN');
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
  <th:block th:replace="${extraScript}"></th:block>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(~{::title}, ~{::content}, ~{::extraStyle}, ~{::extraScript})}">

<head>
    <title th:fragment="title">Reports</title>
    <th:block th:fragment="extraStyle"></th:block>
</head>

<body>
    <th:block th:fragment="content">

        <div class="filter-row">
            <form method="get" style="display:flex; gap:10px; align-items:center;">
                <select name="status" class="form-control" style="width:auto;">
                    <option value="">All Status</option>
                    <option value="pending" th:selected="${selectedStatus == 'pending'}">Pending</option>
                    <option value="investigated" th:selected="${selectedStatus == 'investigated'}">Under Investigation
                    </option>
                    <option value="resolved" th:selected="${selectedStatus == 'resolved'}">Resolved</option>
                </select>
                <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-filter"></i> Filter</button>
                <a href="/reports" class="btn btn-ghost btn-sm">Reset</a>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-flag" style="color:var(--warning); margin-right:8px;"></i>Report Management</h3>
            </div>
            <div class="card-body">
                <table th:if="${!reports.empty}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Reporter</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${reports}">
                            <td>#<span th:text="${r.id}"></span></td>
                            <td th:text="${r.userId}"></td>
                            <td><span class="badge" th:classappend="'badge-' + ${r.type}" th:text="${r.type}"></span>
                            </td>
                            <td><span class="badge" th:classappend="'badge-' + ${r.status}"
                                    th:text="${r.status}"></span></td>
                            <td style="color:var(--text-muted); font-size:12px;"
                                th:text="${r.createdAt != null ? #temporals.format(r.createdAt,'dd/MM/yyyy HH:mm') : '—'}">
                            </td>
                            <td>
                                <div style="display:flex; gap:6px; flex-wrap:wrap;">
                                    <a th:href="@{/reports/{id}(id=${r.id})}" class="btn btn-ghost btn-sm">
                                        <i class="fas fa-eye"></i> View
                                    </a>
                                    <form th:if="${r.status == 'pending'}"
                                        th:action="@{/reports/{id}/investigate(id=${r.id})}" method="post"
                                        style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />
                                        <button class="btn btn-warning btn-sm" type="submit">
                                            <i class="fas fa-search"></i> Investigate
                                        </button>
                                    </form>
                                    <form th:if="${r.status != 'resolved'}"
                                        th:action="@{/reports/{id}/resolve(id=${r.id})}" method="post"
                                        style="display:inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}"
                                            th:value="${_csrf.token}" />
                                        <button class="btn btn-success btn-sm" type="submit">
                                            <i class="fas fa-check"></i> Resolve
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${reports.empty}">
                    <i class="fas fa-flag"></i>
                    <p>No reports found.</p>
                </div>
            </div>
        </div>

    </th:block>
    <th:block th:fragment="extraScript"></th:block>
</body>

</html>

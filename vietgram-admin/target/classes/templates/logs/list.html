<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(~{::title}, ~{::content}, ~{::extraStyle}, ~{::extraScript})}">

<head>
    <title th:fragment="title">System Logs</title>
    <th:block th:fragment="extraStyle"></th:block>
</head>

<body>
    <th:block th:fragment="content">
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-terminal" style="color:var(--accent2); margin-right:8px;"></i>System Logs (Latest
                    100)</h3>
            </div>
            <div class="card-body">
                <table th:if="${!logs.empty}">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User ID</th>
                            <th>Action</th>
                            <th>Details</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="log : ${logs}">
                            <td style="color:var(--text-muted);">#<span th:text="${log.id}"></span></td>
                            <td th:text="${log.userId ?: '—'}"></td>
                            <td>
                                <span style="font-family: monospace; font-size:12px; background:rgba(255,255,255,0.06);
                           padding:3px 8px; border-radius:6px;" th:text="${log.action}"></span>
                            </td>
                            <td style="color:var(--text-muted); font-size:12px; max-width:260px; overflow:hidden;
                       text-overflow:ellipsis; white-space:nowrap;" th:text="${log.details}"></td>
                            <td style="color:var(--text-muted); font-size:12px; white-space:nowrap;"
                                th:text="${log.createdAt != null ? #temporals.format(log.createdAt,'dd/MM/yyyy HH:mm:ss') : '—'}">
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${logs.empty}">
                    <i class="fas fa-inbox"></i>
                    <p>No system logs found.</p>
                </div>
            </div>
        </div>
    </th:block>
    <th:block th:fragment="extraScript"></th:block>
</body>

</html>
